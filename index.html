<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Official Store</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b0b1a;color:white}

/* PAGES */
.page{display:none;padding:20px}
.active{display:block}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#2575fc;
  color:white;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}

/* HEADER */
header{
  background:#2575fc;
  padding:12px;
  text-align:center;
  font-weight:bold;
  position:relative;
}

/* SMALL ADMIN BUTTON */
.adminBtn{
  position:absolute;
  left:10px;
  top:8px;
  background:#0f0f20;
  color:white;
  border:1px solid #2d2d55;
  padding:5px 8px;
  border-radius:6px;
  font-size:11px;
}

/* CART */
.cartBtn{
  position:absolute;
  right:10px;
  top:8px;
  background:#111;
  color:white;
  border:none;
  padding:8px;
  border-radius:8px;
}

/* PRODUCTS */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.product{
  background:#1e1e38;
  padding:10px;
  border-radius:10px;
  text-align:center;
}
</style>
</head>

<body>

<!-- WELCOME -->
<div id="welcome" class="page active">
  <h1>🚀 Nova Official Store</h1>
  <button class="btn" onclick="go('phone')">Enter Store</button>
</div>

<!-- PHONE -->
<div id="phone" class="page">
  <h3>Enter WhatsApp Number</h3>
  <input id="phoneInput" maxlength="10"
  oninput="this.value=this.value.replace(/\D/g,'').slice(0,10)">
  <button class="btn" onclick="enterShop()">Continue</button>
</div>

<!-- SHOP -->
<div id="shop" class="page">

<header>
  Nova Store
  <button class="cartBtn" onclick="toggleCart()">🛒 <span id="count">0</span></button>
  <button class="adminBtn" onclick="go('admin')">Admin</button>
</header>

<h3>Game Details</h3>
<input id="gameServer" placeholder="Game Server">
<input id="playerId" placeholder="Player ID">

<div class="grid">
  <div class="product">
    BGMI UC
    <button class="btn" onclick="add('BGMI UC',100)">Add ₹100</button>
  </div>
</div>

</div>

<!-- CART -->
<div id="cart" style="display:none"></div>

<!-- ADMIN -->
<div id="admin" class="page">
  <h2>Admin Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button class="btn" onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div id="panel" class="page">
  <h2>Orders</h2>
  <div id="orders"></div>
</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

/* TELEGRAM */
const botToken = "YOUR_BOT_TOKEN";
const adminIds = ["8720072070"];

/* STATE */
let cart=[];
let phone="";

/* NAV */
function go(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById(p).classList.add("active");
}

/* PHONE */
function enterShop(){
  phone="91"+document.getElementById("phoneInput").value;
  go("shop");
}

/* CART */
function add(name,price){
  cart.push({name,price});
  document.getElementById("count").innerText=cart.length;
}

/* 🔔 TELEGRAM FIXED */
function sendTelegram(msg){

  adminIds.forEach(id=>{

    fetch(`https://api.telegram.org/bot${botToken}/sendMessage`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        chat_id:id,
        text:msg
      })
    })
    .then(r=>r.json())
    .then(res=>console.log("Telegram sent ✔",res))
    .catch(err=>console.log("Telegram error ❌",err));

  });

}

/* CHECKOUT */
function checkout(){

  if(cart.length==0) return alert("Cart empty");

  let total=cart.reduce((a,b)=>a+b.price,0);
  let items=cart.map(c=>c.name).join(", ");

  let server=document.getElementById("gameServer").value;
  let pid=document.getElementById("playerId").value;

  if(!server||!pid) return alert("Enter details");

  db.collection("orders").add({
    phone,
    items,
    total,
    server,
    pid,
    claimed:false,
    time:Date.now()
  });

  sendTelegram(`🛒 NEW ORDER\n📱 ${phone}\n📦 ${items}\n💰 ₹${total}`);

  cart=[];
  document.getElementById("count").innerText=0;

  alert("✅ Order Confirmed");
}

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(loadOrders)
  .then(()=>go("panel"));
}

/* ORDERS */
function loadOrders(){
  db.collection("orders").onSnapshot(snap=>{
    let box=document.getElementById("orders");
    box.innerHTML="";

    snap.forEach(doc=>{
      let o=doc.data();

      box.innerHTML+=`
        <div style="background:#1e1e38;padding:10px;margin:10px;border-radius:10px">

          📱 ${o.phone}<br>
          📦 ${o.items}<br>
          💰 ₹${o.total}<br>

          <button class="btn" onclick="claim('${doc.id}','${o.phone}','${o.items}')">Claim</button>
          <button class="btn" style="background:red" onclick="rejectOrder('${doc.id}')">Reject</button>

        </div>
      `;
    });

  });
}

/* CLAIM */
async function claim(id,phone,items){

  await db.collection("orders").doc(id).update({
    claimed:true
  });

  window.open(`https://wa.me/${phone}?text=Your order is being processed ✔%0A${items}`);
}

/* ❌ REJECT → DELETE ORDER */
async function rejectOrder(id){
  await db.collection("orders").doc(id).delete();
  alert("Order deleted ❌");
}

</script>

</body>
</html>
