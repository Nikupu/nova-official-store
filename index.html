<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Official Store</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- ONESIGNAL -->
<script src="https://cdn.onesignal.com/sdks/OneSignalSDK.js" async></script>

<script>
window.OneSignal = window.OneSignal || [];

OneSignal.push(function() {
  OneSignal.init({
    appId: "f4bea716-26b5-4ec4-aa35-55fee7fcf91a",
    notifyButton: { enable: true }
  });
});
</script>

<style>
body{margin:0;font-family:Arial;background:#0b0b1a;color:white}
header{background:#2575fc;padding:14px;text-align:center;font-weight:bold;position:relative}
.adminBtn{position:absolute;right:10px;top:10px;background:red;border:none;color:white;padding:6px 10px;border-radius:6px}
.page{display:none;padding:15px}
.active{display:block}
.btn{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#2575fc;color:white}
.tabs{display:flex;gap:5px;margin-bottom:10px}
.tab{flex:1;padding:10px;background:#1c1c33;border:none;color:white;border-radius:8px}
.tab.active{background:#2575fc}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.product{background:#1e1e38;padding:10px;border-radius:10px;text-align:center}
.product img{width:100%;height:100px;object-fit:cover;border-radius:8px}
.cartBar{background:#111;padding:10px;border-radius:10px;margin-bottom:10px;position:sticky;top:0}
input{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:none}
</style>
</head>

<body>

<header>
  Nova Official Store
  <button class="adminBtn" onclick="go('admin')">Admin</button>
</header>

<!-- HOME -->
<div class="page active" id="home">
  <h2>Welcome to Nova Store</h2>
  <button class="btn" onclick="go('phone')">Enter Shop</button>
</div>

<!-- PHONE -->
<div class="page" id="phone">
  <h3>Enter WhatsApp Number</h3>
  <input id="phoneInput" maxlength="10"
  oninput="this.value=this.value.replace(/\D/g,'').slice(0,10)">
  <button class="btn" onclick="enterShop()">Continue</button>
</div>

<!-- SHOP -->
<div class="page" id="shop">

  <div class="cartBar">
    🛒 Cart: <span id="cartCount">0</span>
    <button class="btn" onclick="checkout()">Checkout</button>
  </div>

  <div class="grid">
    <div class="product">BGMI UC<button class="btn" onclick="add('BGMI UC')">Add</button></div>
    <div class="product">Free Fire<button class="btn" onclick="add('FF Diamonds')">Add</button></div>
    <div class="product">Netflix<button class="btn" onclick="add('Netflix')">Add</button></div>
  </div>

</div>

<!-- ADMIN -->
<div class="page" id="admin">
  <h3>Admin Login</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button class="btn" onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div class="page" id="panel">
  <h3>Orders</h3>
  <div id="orders"></div>
</div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey:"AIzaSyB5KG4iKmlDQ_yvrXRfIIsUMZriT4VduTU",
  authDomain:"nova-official-store.firebaseapp.com",
  projectId:"nova-official-store"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let phone="";
let cart=[];

// NAV
function go(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById(p).classList.add("active");
}

// PHONE
function enterShop(){
  let num=document.getElementById("phoneInput").value;
  if(num.length!==10) return alert("Enter 10 digits");
  phone="91"+num;
  go("shop");
}

// CART
function add(item){
  cart.push(item);
  document.getElementById("cartCount").innerText=cart.length;
}

// ✅ FIXED CHECKOUT
async function checkout(){

  if(cart.length===0){
    alert("Cart empty");
    return;
  }

  try{

    await db.collection("orders").add({
      phone:phone,
      items:cart,
      status:"pending",
      claimed:false,
      claimedBy:null,
      time:Date.now()
    });

    // 🔔 SIMPLE NOTIFICATION (NO API)
    OneSignal.push(function () {
      OneSignal.sendSelfNotification(
        "🛒 New Order",
        phone + " placed an order",
        "",
        "",
        {}
      );
    });

    cart=[];
    document.getElementById("cartCount").innerText=0;

    alert("Order placed ✔");

  }catch(e){
    alert("Error: "+e.message);
  }
}

// LOGIN
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(()=>{
    loadOrders();
    go("panel");
  })
  .catch(e=>alert(e.message));
}

// ✅ LOAD ORDERS + CLAIM BUTTON
function loadOrders(){

  db.collection("orders")
  .orderBy("time","desc")
  .onSnapshot(snap=>{

    let box=document.getElementById("orders");
    box.innerHTML="";

    snap.forEach(doc=>{
      let o=doc.data();

      box.innerHTML+=`
      <div style="background:#1a1a33;padding:10px;margin:10px 0;border-radius:10px">
        <b>${o.phone}</b><br>
        ${o.items.join(", ")}<br>
        Status: ${o.status}
        <button class="btn" onclick="claim('${doc.id}','${o.phone}','${o.items}')">Claim</button>
      </div>`;
    });

  });
}

// CLAIM
async function claim(id,phone,items){

  const ref=db.collection("orders").doc(id);

  await ref.update({
    claimed:true,
    claimedBy:auth.currentUser.email,
    status:"claimed"
  });

  window.open("https://wa.me/"+phone+"?text="+items);
}

</script>

</body>
</html>
