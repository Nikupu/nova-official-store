<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Official Store</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b0b1a;color:white}

/* PAGES */
.page{display:none;padding:20px}
.active{display:block}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#2575fc;
  color:white;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}

/* HEADER */
header{
  background:#2575fc;
  padding:12px;
  text-align:center;
  font-weight:bold;
  position:relative;
}

/* SMALL ADMIN BUTTON */
.adminBtn{
  position:absolute;
  left:10px;
  top:8px;
  background:#0f0f20;
  color:white;
  border:1px solid #2d2d55;
  padding:5px 8px;
  border-radius:6px;
  font-size:11px;
}

/* CART */
.cartBtn{
  position:absolute;
  right:10px;
  top:8px;
  background:#111;
  color:white;
  border:none;
  padding:8px;
  border-radius:8px;
}

/* TABS */
.tabs{display:flex;overflow-x:auto;background:#111}
.tab{
  flex:1;
  min-width:120px;
  padding:12px;
  background:#1c1c33;
  border:none;
  color:white;
}
.tab.active{background:#2575fc}

/* PRODUCTS */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.product{
  background:#1e1e38;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.product img{
  width:100%;
  height:100px;
  object-fit:cover;
  border-radius:8px;
  margin-bottom:5px;
}

/* CART */
#cart{
  position:fixed;
  top:0;
  right:-100%;
  width:80%;
  height:100%;
  background:#0f0f20;
  transition:0.3s;
  padding:15px;
  z-index:999;
}
#cart.open{right:0}

.cartItem{
  background:#1e1e38;
  padding:10px;
  margin-bottom:8px;
  border-radius:10px;
}

/* SUCCESS SCREEN */
#successScreen{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

.check{
  width:80px;
  height:80px;
  border-radius:50%;
  background:#2575fc;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  animation:pop 0.4s ease;
}

@keyframes pop{
  0%{transform:scale(0)}
  100%{transform:scale(1)}
}
</style>
</head>

<body>

<!-- 🎉 SUCCESS SCREEN -->
<div id="successScreen">
  <div class="check">✔</div>
  <h2>Order Confirmed</h2>
  <p>We are processing your order</p>
</div>

<!-- 🏠 WELCOME -->
<div id="welcome" class="page active">
  <h1>🚀 Nova Official Store</h1>
  <button class="btn" onclick="go('phone')">Enter Store</button>
</div>

<!-- 📱 PHONE -->
<div id="phone" class="page">
  <h3>Enter WhatsApp Number</h3>
  <input id="phoneInput" maxlength="10"
  oninput="this.value=this.value.replace(/\D/g,'').slice(0,10)">
  <button class="btn" onclick="enterShop()">Continue</button>
</div>

<!-- 🛍️ SHOP -->
<div id="shop" class="page">

<header>
  Nova Store

  <button class="cartBtn" onclick="toggleCart()">
    🛒 <span id="count">0</span>
  </button>

  <button class="adminBtn" onclick="go('admin')">Admin</button>
</header>

<h3>Game Details</h3>
<input id="gameServer" placeholder="Game Server">
<input id="playerId" placeholder="Player ID">

<div class="tabs">
  <button class="tab active" onclick="showTab('games')">Games</button>
  <button class="tab" onclick="showTab('topup')">Topup</button>
  <button class="tab" onclick="showTab('premium')">Premium</button>
</div>

<!-- GAMES -->
<div id="games" class="tabPage active">
  <div class="grid">

    <div class="product">
      <img src="YOUR_IMG_URL">
      BGMI UC
      <button class="btn" onclick="add('BGMI UC',100)">Add ₹100</button>
    </div>

    <div class="product">
      <img src="YOUR_IMG_URL">
      Free Fire
      <button class="btn" onclick="add('FF Diamonds',150)">Add ₹150</button>
    </div>

  </div>
</div>

<!-- TOPUP -->
<div id="topup" class="tabPage" style="display:none">
  <div class="grid">
    <div class="product">
      <img src="YOUR_IMG_URL">
      Google Play
      <button class="btn" onclick="add('Google Play',100)">Add ₹100</button>
    </div>
  </div>
</div>

<!-- PREMIUM -->
<div id="premium" class="tabPage" style="display:none">
  <div class="grid">
    <div class="product">
      <img src="YOUR_IMG_URL">
      Netflix
      <button class="btn" onclick="add('Netflix',199)">Add ₹199</button>
    </div>
  </div>
</div>

</div>

<!-- 🛒 CART -->
<div id="cart">

<h3>Your Cart</h3>
<div id="cartBox"></div>

<h3>Total: ₹<span id="total">0</span></h3>

<button class="btn" onclick="checkout()">Checkout</button>
<button class="btn" onclick="toggleCart()">Close</button>

</div>

<!-- 👑 ADMIN -->
<div id="admin" class="page">
  <h2>Admin Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button class="btn" onclick="login()">Login</button>
</div>

<!-- 📊 PANEL -->
<div id="panel" class="page">
  <h2>Orders</h2>
  <div id="orders"></div>
</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyB5KG4iKmlDQ_yvrXRfIIsUMZriT4VduTU",
  authDomain: "nova-official-store.firebaseapp.com",
  projectId: "nova-official-store"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

/* TELEGRAM */
const botToken = "8744636068:AAHer6DTm0hGrhrRxPmfdhLg0zjrSmGNuTs";
const adminIds = ["8720072070"];

/* STATE */
let cart=[];
let phone="";

/* NAV */
function go(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById(p).classList.add("active");
}

/* PHONE */
function enterShop(){
  phone="91"+document.getElementById("phoneInput").value;
  go("shop");
}

/* CART */
function toggleCart(){
  document.getElementById("cart").classList.toggle("open");
}

function add(name,price){
  cart.push({name,price});
  updateCart();
}

function removeItem(i){
  cart.splice(i,1);
  updateCart();
}

function updateCart(){
  let box=document.getElementById("cartBox");
  box.innerHTML="";
  let total=0;

  cart.forEach((c,i)=>{
    total+=c.price;
    box.innerHTML+=`
      <div class="cartItem">
        ${c.name} - ₹${c.price}
        <button class="btn" style="background:red" onclick="removeItem(${i})">Remove</button>
      </div>
    `;
  });

  document.getElementById("count").innerText=cart.length;
  document.getElementById("total").innerText=total;
}

/* CHECKOUT */
function checkout(){

  if(cart.length==0) return alert("Cart empty");

  let total=cart.reduce((a,b)=>a+b.price,0);
  let items=cart.map(c=>c.name).join(", ");
  let server=document.getElementById("gameServer").value;
  let pid=document.getElementById("playerId").value;

  if(!server||!pid) return alert("Enter details");

  db.collection("orders").add({
    phone,items,total,server,pid,
    claimed:false,
    time:Date.now()
  });

  adminIds.forEach(id=>{
    fetch(`https://api.telegram.org/bot${botToken}/sendMessage`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        chat_id:id,
        text:`🛒 NEW ORDER\n📱 ${phone}\n📦 ${items}\n💰 ₹${total}`
      })
    });
  });

  cart=[];
  updateCart();
  toggleCart();

  // 🎉 SUCCESS SCREEN
  document.getElementById("successScreen").style.display="flex";

  setTimeout(()=>{
    document.getElementById("successScreen").style.display="none";
  },2000);
}

/* ADMIN */
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(()=>loadOrders())
  .then(()=>go("panel"));
}

/* ORDERS */
function loadOrders(){
  db.collection("orders").onSnapshot(snap=>{
    let box=document.getElementById("orders");
    box.innerHTML="";

    snap.forEach(doc=>{
      let o=doc.data();

      box.innerHTML+=`
        <div style="background:#1e1e38;padding:10px;margin:10px;border-radius:10px">

          📱 ${o.phone}<br>
          📦 ${o.items}<br>
          💰 ₹${o.total}<br>

          <button class="btn" onclick="claim('${doc.id}','${o.phone}','${o.items}')">Claim</button>
          <button class="btn" style="background:red" onclick="rejectOrder('${doc.id}')">Reject</button>

        </div>
      `;
    });
  });
}

/* CLAIM */
async function claim(id,phone,items){
  await db.collection("orders").doc(id).update({
    claimed:true
  });

  window.open(`https://wa.me/${phone}?text=Your order is being processed ✔%0A${items}`);
}

/* REJECT */
async function rejectOrder(id){
  await db.collection("orders").doc(id).update({
    status:"rejected"
  });
}

</script>

</body>
</html>
