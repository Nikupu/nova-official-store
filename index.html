<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Official Store</title>
<style>
body{margin:0;font-family:Arial;background:#f5f5f5}/* FRONT PAGE */ .front{ height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; background:linear-gradient(45deg,#000,#444); color:white; text-align:center; } .front button{ padding:12px 25px; background:gold; border:none; cursor:pointer; margin-top:15px; font-weight:bold; }

/* SHOP */ .shop{display:none}

nav{ background:black; color:white; padding:10px; display:flex; justify-content:space-between; align-items:center; } nav button{ background:gold; border:none; cursor:pointer; padding:6px 10px; margin-left:5px; }

.products{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:15px; padding:20px; }

.product{ background:white; padding:10px; border-radius:10px; text-align:center; box-shadow:0 2px 6px rgba(0,0,0,0.2); }

.product button{ background:black; color:white; border:none; padding:5px 10px; cursor:pointer; }

/* CART */ .cart{ position:fixed; right:0; top:0; width:260px; height:100%; background:white; border-left:2px solid black; padding:10px; display:none; overflow:auto; }

#qrBox{ display:none; margin-top:15px; text-align:center; }

#qrBox img{ width:160px; border:1px solid #ccc; border-radius:10px; }

</style>
</head>
<body><!-- FRONT PAGE --><div class="front" id="front">
<h1>🔥 Welcome to Nova Official Store 🔥</h1>
<p>Shop smart. Shop fast.</p>
<button onclick="openShop()">Shop Now</button>
</div><!-- SHOP --><div class="shop" id="shop"><nav>
<div>Nova Store</div>
<div>
<button onclick="toggleCart()">Cart (<span id="count">0</span>)</button>
<button onclick="goHome()">Home</button>
</div>
</nav><div class="products" id="products"></div></div><!-- CART --><div class="cart" id="cart">
<h3>🛒 Cart</h3>
<div id="items"></div>
<h4 id="total"></h4><button onclick="checkout()">Checkout</button>

<!-- QR BOX --><div id="qrBox">
<h3>Scan & Pay / WhatsApp Order</h3>
<img src="https://via.placeholder.com/160" alt="QR">
<br><br>
<button onclick="sendWhatsApp()">Send Order on WhatsApp</button>
</div></div><script>
let cart=[];

function openShop(){
document.getElementById('front').style.display='none';
document.getElementById('shop').style.display='block';
}

function goHome(){location.reload();}

function toggleCart(){
let c=document.getElementById('cart');
c.style.display=c.style.display==='block'?'none':'block';
}

function addToCart(name,price){
cart.push({name,price});
document.getElementById('count').innerText=cart.length;
render();
}

function render(){
let items=document.getElementById('items');
items.innerHTML='';
let total=0;
cart.forEach(p=>{
total+=p.price;
items.innerHTML+=`<p>${p.name} - ₹${p.price}</p>`;
});
document.getElementById('total').innerText="Total: ₹"+total;
}

function checkout(){
if(cart.length===0){alert("Cart empty");return;}
document.getElementById('qrBox').style.display='block';
}

function sendWhatsApp(){
let msg="Hello, I want to order:%0A";
let total=0;
cart.forEach(p=>{
msg+=p.name+" - ₹"+p.price+"%0A";
total+=p.price;
});
msg+="Total: ₹"+total;

let phone="919233585106";
let url="https://wa.me/"+phone+"?text="+msg;
window.open(url,'_blank');
}

// PRODUCTS
let box=document.getElementById('products');
for(let i=1;i<=30;i++){
box.innerHTML+=`
<div class='product'>
<h3>Product ${i}</h3>
<p>₹${i*100}</p>
<button onclick="addToCart('Product ${i}',${i*100})">Add</button>
</div>
`;
}

</script></body>
</html>
