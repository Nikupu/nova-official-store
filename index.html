<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Admin Store</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b0b1a;color:white}
header{padding:14px;text-align:center;background:#2575fc;font-weight:bold}
.page{display:none;padding:15px}
.active{display:block}

.card{background:#1a1a33;padding:15px;border-radius:12px;margin-bottom:10px}
.btn{padding:10px;width:100%;margin-top:8px;border:none;border-radius:10px;background:#2575fc;color:white}
.badge{padding:5px 10px;border-radius:8px;font-size:12px}
.pending{background:orange}
.claimed{background:green}
</style>
</head>

<body>

<header>Nova Admin Panel</header>

<!-- LOGIN -->
<div class="page active" id="login">
  <div class="card">
    <h3>Admin Login</h3>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button class="btn" onclick="login()">Login</button>
  </div>
</div>

<!-- ORDERS -->
<div class="page" id="ordersPage">
  <div id="orders"></div>
</div>

<script>

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyB5KG4iKmlDQ_yvrXRfIIsUMZriT4VduTU",
  authDomain: "nova-official-store.firebaseapp.com",
  projectId: "nova-official-store",
  messagingSenderId: "580011808963",
  appId: "1:580011808963:web:78ef2494a362adcedc6a76"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();
const messaging = firebase.messaging();

let currentAdmin = "";

// ================= LOGIN =================
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(u=>{
    currentAdmin = u.user.email;
    goOrders();
    enablePush();
  })
  .catch(e=>alert(e.message));
}

// ================= NAV =================
function goOrders(){
  document.getElementById("login").classList.remove("active");
  document.getElementById("ordersPage").classList.add("active");
  loadOrders();
}

// ================= LOAD ORDERS =================
function loadOrders(){
  db.collection("orders").orderBy("time","desc")
  .onSnapshot(snap=>{
    let box = document.getElementById("orders");
    box.innerHTML = "";

    snap.forEach(doc=>{
      let o = doc.data();

      box.innerHTML += `
        <div class="card">
          <b>${o.phone}</b><br>
          ${o.items.join(", ")}<br><br>

          <span class="badge ${o.status}">
            ${o.status.toUpperCase()}
          </span>

          <button class="btn" onclick="claim('${doc.id}','${o.phone}','${o.items.join(", ")}')">
            Claim Order
          </button>
        </div>
      `;
    });
  });
}

// ================= CLAIM SYSTEM =================
async function claim(id, phone, items){

  const doc = await db.collection("orders").doc(id).get();
  const data = doc.data();

  if(data.status === "claimed"){
    alert("Already claimed");
    return;
  }

  await db.collection("orders").doc(id).update({
    status: "claimed",
    claimedBy: currentAdmin
  });

  window.open(
    "https://wa.me/"+phone+"?text="+encodeURIComponent("Nova Order: "+items)
  );
}

// ================= PUSH (ADMIN ONLY) =================
async function enablePush(){

  const perm = await Notification.requestPermission();
  if(perm !== "granted") return;

  const token = await messaging.getToken({
    vapidKey: "YOUR_VAPID_KEY"
  });

  await db.collection("adminTokens").add({
    token,
    email: currentAdmin
  });

  console.log("Admin push enabled");
}

// ================= FOREGROUND PUSH =================
messaging.onMessage(payload=>{
  alert("🔔 Nova Admin Alert: " + payload.notification.title);
});

</script>

</body>
</html>
