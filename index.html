<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Official Store</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#070714;color:white}

header{
  padding:14px;
  text-align:center;
  background:linear-gradient(90deg,#6a11cb,#2575fc);
  font-weight:bold;
}

/* PAGES */
.page{display:none;padding:15px}
.active{display:block}

/* HOME */
.center{
  height:80vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.btn{
  padding:14px;
  width:100%;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#2575fc;
  color:white;
  font-weight:bold;
}

/* PRODUCT GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.product{
  background:#1e1e38;
  padding:10px;
  border-radius:12px;
  text-align:center;
}

.product img{
  width:100%;
  border-radius:10px;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

/* TABS */
.tabs{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.tab{
  flex:1;
  text-align:center;
  padding:12px;
  font-size:12px;
  cursor:pointer;
}

/* ADMIN */
.card{
  background:#1a1a33;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

.adminBtn{
  position:absolute;
  top:10px;
  right:10px;
  background:#ff3d71;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  color:white;
  font-size:12px;
}
</style>
</head>

<body>

<header>Nova Official Store</header>

<!-- HOME -->
<div class="page active" id="home">

  <button class="adminBtn" onclick="go('adminLogin')">Admin</button>

  <div class="center">
    <h1>Welcome to Nova Official Store</h1>
    <button class="btn" onclick="go('phone')">ENTER SHOP</button>
  </div>
</div>

<!-- PHONE -->
<div class="page" id="phone">
  <div class="card">
    <h3>Enter WhatsApp Number</h3>
    <input id="phoneInput" maxlength="10" oninput="onlyNum()">
    <button class="btn" onclick="validatePhone()">Continue</button>
  </div>
</div>

<!-- SHOP -->
<div class="page" id="shop">

  <!-- PRODUCTS -->
  <div class="grid">

    <!-- 10 PRODUCTS -->
    <div class="product"><img src="https://via.placeholder.com/150">Pack 1<button class="btn" onclick="add('Pack1')">Add</button></div>
    <div class="product"><img src="https://via.placeholder.com/150">Pack 2<button class="btn" onclick="add('Pack2')">Add</button></div>
    <div class="product"><img src="https://via.placeholder.com/150">Pack 3<button class="btn" onclick="add('Pack3')">Add</button></div>
    <div class="product"><img src="https://via.placeholder.com/150">Pack 4<button class="btn" onclick="add('Pack4')">Add</button></div>

    <div class="product"><img src="https://via.placeholder.com/150">Pack 5<button class="btn" onclick="add('Pack5')">Add</button></div>
    <div class="product"><img src="https://via.placeholder.com/150">Pack 6<button class="btn" onclick="add('Pack6')">Add</button></div>
    <div class="product"><img src="https://via.placeholder.com/150">Pack 7<button class="btn" onclick="add('Pack7')">Add</button></div>
    <div class="product"><img src="https://via.placeholder.com/150">Pack 8<button class="btn" onclick="add('Pack8')">Add</button></div>

    <div class="product"><img src="https://via.placeholder.com/150">Pack 9<button class="btn" onclick="add('Pack9')">Add</button></div>
    <div class="product"><img src="https://via.placeholder.com/150">Pack 10<button class="btn" onclick="add('Pack10')">Add</button></div>

  </div>

  <button class="btn" onclick="checkout()">Checkout</button>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab" onclick="go('shop')">🛍 Shop</div>
    <div class="tab" onclick="go('orders')">📦 Orders</div>
    <div class="tab" onclick="go('phone')">👤 Profile</div>
  </div>

</div>

<!-- ORDERS -->
<div class="page" id="orders">
  <div id="orderList"></div>
</div>

<!-- ADMIN -->
<div class="page" id="adminLogin">
  <div class="card">
    <h3>Admin Login</h3>
    <input id="email">
    <input id="password" type="password">
    <button class="btn" onclick="login()">Login</button>
  </div>
</div>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey:"AIzaSyB5KG4iKmlDQ_yvrXRfIIsUMZriT4VduTU",
  authDomain:"nova-official-store.firebaseapp.com",
  projectId:"nova-official-store"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

// STATE
let phone="";
let cart=[];

// NAV
function go(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// PHONE
function onlyNum(){
  let i=document.getElementById("phoneInput");
  i.value=i.value.replace(/\D/g,'').slice(0,10);
}

function validatePhone(){
  let num=document.getElementById("phoneInput").value;

  if(num.length!==10){
    alert("Enter 10-digit number");
    return;
  }

  phone="91"+num;
  go("shop");
}

// CART
function add(p){
  cart.push(p);
  alert(p+" added");
}

// CHECKOUT
async function checkout(){

  if(cart.length===0) return alert("Cart empty");

  await db.collection("orders").add({
    phone,
    items:cart,
    status:"pending",
    time:Date.now()
  });

  cart=[];
  alert("Order placed 🔥");
}

// ADMIN LOGIN
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(loadOrders)
  .catch(e=>alert(e.message));
}

// LOAD ORDERS
function loadOrders(){
  go("orders");

  db.collection("orders").orderBy("time","desc")
  .onSnapshot(snap=>{

    let box=document.getElementById("orderList");
    box.innerHTML="";

    snap.forEach(doc=>{
      let o=doc.data();

      box.innerHTML+=`
        <div class="card">
          <b>${o.phone}</b><br>
          ${o.items.join(", ")}<br>
          Status: ${o.status}
        </div>
      `;
    });

  });
}

</script>

</body>
</html>
